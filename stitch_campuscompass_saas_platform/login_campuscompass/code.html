<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | CampusCompass</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=geist:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
        @font-face {
            font-family: 'geist';
            src: url('https://fonts.cdnfonts.com/css/geist');
        }
        
        body {
            font-family: 'geist', sans-serif;
            background-color: #09090b;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(39, 39, 42, 0.8);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .inner-glow {
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .primary-gradient {
            background: linear-gradient(135deg, #a078ff 0%, #6d3bd7 100%);
        }

        .bg-glow-purple {
            background: radial-gradient(circle at 20% 30%, rgba(140, 92, 246, 0.15) 0%, transparent 50%);
        }

        .bg-glow-cyan {
            background: radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
        }

        .input-glow:focus-within {
            box-shadow: 0 0 0 2px rgba(208, 188, 255, 0.2);
            border-color: #d0bcff;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>

          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "surface-bright": "#3b3742",
                "surface-container": "#211e27",
                "on-error": "#690005",
                "on-primary-fixed-variant": "#5516be",
                "secondary-fixed-dim": "#4cd7f6",
                "on-error-container": "#ffdad6",
                "secondary-container": "#03b5d3",
                "on-surface-variant": "#cbc3d7",
                "on-primary-fixed": "#23005c",
                "background": "#15121b",
                "surface-variant": "#37333d",
                "inverse-primary": "#6d3bd7",
                "on-secondary-fixed-variant": "#004e5c",
                "on-surface": "#e7e0ed",
                "outline": "#958ea0",
                "error-container": "#93000a",
                "primary-fixed": "#e9ddff",
                "on-tertiary": "#482900",
                "surface-tint": "#d0bcff",
                "surface-container-low": "#1d1a23",
                "on-tertiary-fixed": "#2c1700",
                "surface-container-lowest": "#0f0d15",
                "outline-variant": "#494454",
                "on-primary": "#3c0091",
                "on-secondary": "#003640",
                "secondary-fixed": "#acedff",
                "on-secondary-container": "#00424e",
                "inverse-surface": "#e7e0ed",
                "tertiary": "#ffb869",
                "tertiary-container": "#ca801e",
                "on-tertiary-container": "#3f2300",
                "on-secondary-fixed": "#001f26",
                "surface-dim": "#15121b",
                "surface-container-highest": "#37333d",
                "surface": "#15121b",
                "secondary": "#4cd7f6",
                "primary": "#d0bcff",
                "error": "#ffb4ab",
                "inverse-on-surface": "#322f39",
                "on-background": "#e7e0ed",
                "on-primary-container": "#340080",
                "tertiary-fixed": "#ffdcbb",
                "primary-container": "#a078ff",
                "primary-fixed-dim": "#d0bcff",
                "tertiary-fixed-dim": "#ffb869",
                "surface-container-high": "#2c2832",
                "on-tertiary-fixed-variant": "#673d00"
              },
              "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
              },
              "spacing": {
                "xl": "80px",
                "xs": "8px",
                "lg": "48px",
                "base": "4px",
                "margin-mobile": "16px",
                "sm": "16px",
                "margin-desktop": "32px",
                "md": "24px",
                "gutter": "24px"
              },
              "fontFamily": {
                "headline-md": ["geist"],
                "headline-lg-mobile": ["geist"],
                "body-lg": ["geist"],
                "label-md": ["geist"],
                "body-md": ["geist"],
                "label-sm": ["geist"],
                "headline-lg": ["geist"]
              },
              "fontSize": {
                "headline-md": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                "headline-lg-mobile": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "500"}],
                "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "600"}],
                "headline-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}]
              }
            },
          },
        }

</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Atmospheric Background Layers -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute inset-0 bg-glow-purple"></div>
<div class="absolute inset-0 bg-glow-cyan"></div>
<!-- Moving Particle Effect (JS Controlled) -->
<div class="absolute inset-0 opacity-20" id="particles-container"></div>
</div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-[440px] px-margin-mobile md:px-0">
<!-- Header / Logo -->
<div class="flex flex-col items-center mb-md animate-fade-in">
<div class="w-12 h-12 rounded-xl primary-gradient flex items-center justify-center shadow-[0_0_20px_rgba(160,120,255,0.4)] mb-sm">
<span class="material-symbols-outlined text-on-primary-container !text-3xl" style="font-variation-settings: 'FILL' 1;">explore</span>
</div>
<h1 class="text-on-surface font-headline-md text-headline-md tracking-tight">CampusCompass</h1>
<p class="text-on-surface-variant font-body-md text-body-md mt-base">Welcome back to the future of learning</p>
</div>
<!-- Login Card -->
<div class="glass-card inner-glow rounded-xl p-md md:p-lg border-outline-variant/30">
<form class="space-y-md" id="auth-form">
<!-- Email Input -->
<div class="space-y-xs">
<label class="text-on-surface-variant font-label-sm text-label-sm block ml-base" for="email">Email Address</label>
<div class="input-glow flex items-center bg-surface-container-lowest border border-outline-variant/30 rounded-lg transition-all duration-300">
<span class="material-symbols-outlined text-outline-variant px-sm text-sm">mail</span>
<input class="bg-transparent border-none text-on-surface font-body-md text-body-md w-full py-sm focus:ring-0 placeholder:text-outline-variant/50" id="email" placeholder="alex@campus.edu" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<label class="text-on-surface-variant font-label-sm text-label-sm block ml-base" for="password">Password</label>
<div class="input-glow flex items-center bg-surface-container-lowest border border-outline-variant/30 rounded-lg transition-all duration-300">
<span class="material-symbols-outlined text-outline-variant px-sm text-sm">lock</span>
<input class="bg-transparent border-none text-on-surface font-body-md text-body-md w-full py-sm focus:ring-0 placeholder:text-outline-variant/50" id="password" placeholder="••••••••" required="" type="password"/>
<button class="px-sm text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-sm">visibility</span>
</button>
</div>
</div>
<!-- Helper Actions -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-xs cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant bg-surface-container text-primary focus:ring-primary/20" type="checkbox"/>
<span class="text-on-surface-variant font-label-sm text-label-sm group-hover:text-on-surface transition-colors">Remember Me</span>
</label>
<a class="text-primary font-label-sm text-label-sm hover:text-secondary transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Login Button -->
<button class="w-full primary-gradient text-on-primary-container font-label-md text-label-md py-sm rounded-lg shadow-lg hover:brightness-110 active:scale-[0.98] transition-all duration-200" type="submit">
                    Login
                </button>
<!-- Divider -->
<div class="relative py-base flex items-center">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-sm text-outline-variant font-label-sm text-label-sm">Or continue with</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Social Login -->
<button class="w-full bg-surface-container-low border border-outline-variant/30 text-on-surface font-label-md text-label-md py-sm rounded-lg flex items-center justify-center gap-sm hover:bg-surface-variant/50 active:scale-[0.98] transition-all duration-200" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.67-.35-1.39-.35-2.09s.13-1.42.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google Login
                </button>
</form>
</div>
<!-- Footer Links -->
<p class="mt-lg text-center text-on-surface-variant font-label-sm text-label-sm">
            Don't have an account? 
            <a class="text-primary hover:text-secondary font-bold transition-colors" href="#">Get Started</a>
</p>
</main>
<!-- Visual Polish: Floating Glow Orbs -->
<div class="absolute -top-[10%] -left-[5%] w-[400px] h-[400px] rounded-full bg-primary/10 blur-[120px] pointer-events-none"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[500px] h-[500px] rounded-full bg-secondary/10 blur-[150px] pointer-events-none"></div>
<script>
        // Subtle floating particle effect for atmosphere
        const container = document.getElementById('particles-container');
        const particleCount = 15;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'absolute rounded-full bg-white opacity-20';
            
            const size = Math.random() * 2 + 1;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            resetParticle(particle);
            container.appendChild(particle);
            animateParticle(particle);
        }

        function resetParticle(p) {
            p.style.left = `${Math.random() * 100}%`;
            p.style.top = `${Math.random() * 100}%`;
            p.style.opacity = Math.random() * 0.3;
        }

        function animateParticle(p) {
            const duration = Math.random() * 20000 + 10000;
            const xMove = (Math.random() - 0.5) * 200;
            const yMove = (Math.random() - 0.5) * 200;

            p.animate([
                { transform: 'translate(0, 0)', opacity: p.style.opacity },
                { transform: `translate(${xMove}px, ${yMove}px)`, opacity: 0 }
            ], {
                duration: duration,
                iterations: Infinity,
                direction: 'alternate',
                easing: 'ease-in-out'
            });
        }

        // Form Submission Interaction
        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">refresh</span> Signing in...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = 'Success';
                btn.classList.add('bg-secondary');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.classList.remove('bg-secondary');
                }, 1500);
            }, 2000);
        });
    </script>
</body></html>
